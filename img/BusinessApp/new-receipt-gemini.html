<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Receipt Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-gemini.css">
</head>
<body class="min-h-screen flex flex-col m-0 p-0">

    <div class="top-banner px-6 py-3 text-sm font-semibold shadow-sm">
        Saturday 14/05/2026
    </div>

    <div class="flex flex-1">
        
        <aside class="sidebar-nav w-64 p-4 flex flex-col justify-between">
            <div class="flex flex-col gap-2">
                <a href="#" class="nav-item-active flex items-center gap-3 px-4 py-3 rounded-xl font-bold shadow-sm">
                    <i class="fa-solid fa-house text-lg w-5 text-center"></i>
                    <h3>Dashboard</h3>
                </a>
                <a href="#" class="nav-item-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold mt-2">
                    <i class="fa-solid fa-receipt text-lg w-5 text-center"></i>
                    <span>Receipt</span>
                </a>
                <a href="#" class="nav-item-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold">
                    <i class="fa-solid fa-money-bill-wave text-lg w-5 text-center"></i>
                    <span>Orders</span>
                </a>
                <a href="#" class="nav-item-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold">
                    <i class="fa-solid fa-money-bill-wave text-lg w-5 text-center"></i>
                    <span>Stock</span>
                </a>
                <a href="#" class="nav-item-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold">
                    <i class="fa-solid fa-money-bill-wave text-lg w-5 text-center"></i>
                    <span>Items</span>
                </a>
            </div>

            <div class="flex flex-col gap-2 mb-4">
                <a href="#" class="nav-item-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold">
                    <i class="fa-solid fa-wrench text-lg w-5 text-center"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="nav-item-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold">
                    <i class="fa-solid fa-right-from-bracket text-lg w-5 text-center"></i>
                    <span>Log Out</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8 flex flex-col justify-between">
            <div>
                <h1 class="text-4xl font-extrabold mb-10 tracking-tight" style="color: var(--dark-green);">New Receipt</h1>

                <div class="max-w-5xl">
                    <div class="table-header grid grid-cols-12 gap-4 pb-3 mb-4 text-sm font-bold px-2">
                        <div class="col-span-2">Actions</div>
                        <div class="col-span-2 text-center">PID</div>
                        <div class="col-span-3 text-left pl-4">Item Name</div>
                        <div class="col-span-2 text-center">Qty</div>
                        <div class="col-span-1 text-center">UP</div>
                        <div class="col-span-2 text-right pr-4">Total(XAF)</div>
                    </div>

                    <div id="receipt-rows-container" class="space-y-4 mb-8">
                        </div>
                </div>
            </div>

            <div class="max-w-5xl border-t pt-6 mt-10" style="border-color: var(--light-gray);">
                <div class="flex justify-between items-center mb-6 px-2">
                    <span class="text-lg font-bold" style="color: var(--dark-green);">Total</span>
                    <span id="grand-total" class="text-xl font-extrabold" style="color: var(--dark-green);">0</span>
                </div>

                <div class="mb-8 max-w-sm">
                    <label class="block text-sm font-bold mb-2" style="color: var(--dark-green);">
                        <span style="color: var(--error-text);">*</span>Customer Name
                    </label>
                    <input type="text" placeholder="Mengue Frederick" class="form-input-element w-full px-4 py-3 rounded-xl font-medium shadow-sm" />
                </div>

                <div class="flex justify-between items-center">
                    <button type="button" class="btn-print px-6 py-3 rounded-xl font-bold shadow-sm text-base">
                        Print receipt
                    </button>
                    <button type="button" class="btn-cancel px-6 py-3 rounded-xl font-bold shadow-sm text-base">
                        Cancel
                    </button>
                </div>

                <div class="mt-12 p-4 bg-white rounded-xl border shadow-sm" style="border-color: var(--light-gray);">
                    <h3 class="text-sm font-bold mb-2" style="color: var(--dark-green);">Live Output Array Data State (`receiptData`):</h3>
                    <pre id="array-debug" class="p-3 rounded text-xs font-mono overflow-x-auto" style="background-color: var(--light-green); color: var(--dark-green);">[]</pre>
                </div>
            </div>
        </main>
    </div>

    <script src="receipt-gemini.js"></script>
</body>
</html>
