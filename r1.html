
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Receipt Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Hidden on screen by default */
        #printable-receipt-slip {
            display: none;
        }

        /* Print Media Layout Overrides */
        @media print {
            /* Hide the management interface completely */
            .management-ui {
                display: none !important;
            }

            /* Unhide and format the clean retail receipt slip */
            #printable-receipt-slip {
                display: block !important;
                font-family: 'Courier New', Courier, monospace;
                background: #ffffff;
                color: #000000;
                width: 100%;
                max-width: 100%;
                padding: 0;
                margin: 0;
                font-size: 12px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-8">

    <!-- ================================================================= -->
    <!-- SCREEN INTERFACE: Matches Screenshot 2026-07-02 173102.png      -->
    <!-- ================================================================= -->
    <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-sm management-ui">
        <!-- Header -->
        <h1 class="text-3xl font-light text-teal-900 mb-8">New Receipt</h1>

        <!-- Validation Alert Banner -->
        <div id="validation-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm font-medium">
            Please fill out all required fields.
        </div>

        <!-- Receipt Table -->
        <div class="overflow-x-auto mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-300 text-xs font-semibold text-gray-600 tracking-wider">
                        <th class="py-3 px-2 w-24">Actions</th>
                        <th class="py-3 px-2 w-32">PID</th>
                        <th class="py-3 px-2">Item Name</th>
                        <th class="py-3 px-2">Description</th>
                        <th class="py-3 px-2 w-24">Qty</th>
                        <th class="py-3 px-2 w-28">UP</th>
                        <th class="py-3 px-2 text-right w-32">Total(XAF)</th>
                    </tr>
                </thead>
                <tbody id="receipt-items">
                    <!-- Dynamic rows inject here -->
                </tbody>
            </table>
        </div>

        <!-- Grand Total Section -->
        <div class="border-t-2 border-gray-300 pt-4 flex justify-between items-center text-lg font-bold text-gray-900 mb-6">
            <span>Total</span>
            <span id="grand-total">0</span>
        </div>

        <!-- Customer Name Input Row -->
        <div class="mb-12">
            <label class="block text-xs font-semibold text-gray-700 mb-1">
                <span class="text-red-500">*</span>Customer Name
            </label>
            <input type="text" id="customer-name" value="" placeholder="e.g. Mengue Frederick" class="w-64 border border-gray-300 text-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-teal-600">
        </div>

        <!-- Action Buttons Footer -->
        <div class="flex justify-between items-center pt-6 border-t border-gray-100">
            <button onclick="printReceipt()" class="bg-emerald-950 hover:bg-emerald-900 text-white font-medium px-4 py-2.5 rounded flex items-center gap-2 cursor-pointer text-sm shadow-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print receipt
            </button>
            <button onclick="resetForm()" class="bg-gray-200 hover:bg-gray-300 text-red-700 font-medium px-5 py-2.5 rounded text-sm transition-colors cursor-pointer">
                Cancel
            </button>
        </div>
    </div>


    <!-- ================================================================= -->
    <!-- PRINT-ONLY RECEIPT SLIP (Hidden completely on screen)            -->
    <!-- ================================================================= -->
    <div id="printable-receipt-slip" class="max-w-sm mx-auto">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="font-size: 16px; font-weight: bold; margin: 0; text-transform: uppercase;">MARKET OUTLET STORE</h2>
            <p style="margin: 2px 0; color: #555;">100 Business Rd, Suite A</p>
            <p style="margin: 2px 0; color: #555;">Tel: (555) 019-2834</p>
            <p style="margin: 10px 0 5px 0; border-bottom: 1px dashed #000; padding-bottom: 5px; font-weight: bold;">CASH RECEIPT</p>
        </div>

        <div style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 2px;">
                <span>Date:</span><span id="slip-date">2026-07-02</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Customer:</span><span id="slip-customer" style="font-weight: bold;">—</span>
            </div>
        </div>

        <div style="border-bottom: 1px dashed #000; margin-bottom: 10px;"></div>

        <!-- Dynamic Items Container inside Receipt -->
        <div id="slip-items" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px;">
            <!-- Programmatically injected items populate here -->
        </div>

        <div style="border-bottom: 1px dashed #000; margin-bottom: 10px;"></div>

        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: bold;">
            <span>TOTAL:</span>
            <span>XAF <span id="slip-grand-total">0</span></span>
        </div>

        <div style="text-align: center; margin-top: 35px; border-top: 1px dashed #000; padding-top: 15px;">
            <p style="font-weight: bold; margin: 0; letter-spacing: 1px;">THANK YOU FOR YOUR VISIT!</p>
            <p style="color: #666; margin: 4px 0 0 0; font-size: 10px;">Please retain this receipt for returns</p>
        </div>
    </div>


    <!-- ================================================================= -->
    <!-- LOGIC APPLICATION                                                 -->
    <!-- ================================================================= -->
    <script>
        // Mock Database Object
        const productDatabase = {
            "RdCn": { name: "Red Corn", desc: "bag", up: 4000 },
            "WhCn": { name: "White Corn", desc: "bag", up: 4200 },
            "YlCn": { name: "Yellow Corn", desc: "bag", up: 3800 },
            "SgBr": { name: "Sugar Brown", desc: "kg", up: 800 }
        };

        const tbody = document.getElementById('receipt-items');
        const grandTotalEl = document.getElementById('grand-total');
        const errorBanner = document.getElementById('validation-error');

        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        window.onload = () => {
            // Set static date dynamic fallback matching 2026 timeline
            document.getElementById('slip-date').textContent = new Date().toISOString().split('T')[0];
            addRow(); // Row initializes cleanly completely unselected
        };

        // Add row directly to table management
        function addRow() {
            const rowId = 'row_' + Math.random().toString(36).substr(2, 9);
            const tr = document.createElement('tr');
            tr.id = rowId;
            tr.className = "border-b border-gray-100 text-sm text-gray-800";

            let pidOptions = `<option value="" selected disabled>-- Select --</option>`;
            for (let key in productDatabase) {
                pidOptions += `<option value="${key}">${key}</option>`;
            }

            tr.innerHTML = `
                <td class="py-4 px-2 flex items-center gap-1.5">
                    <button onclick="addRow()" class="w-6 h-6 flex items-center justify-center bg-green-50 text-green-600 rounded border border-green-200 hover:bg-green-100 font-bold text-base cursor-pointer">+</button>
                    <button onclick="deleteRow('${rowId}')" class="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded border border-red-100 hover:bg-red-100 cursor-pointer">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </td>
                <td class="py-4 px-2">
                    <select onchange="handlePidChange('${rowId}', this.value)" class="bg-white border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none w-28">
                        ${pidOptions}
                    </select>
                </td>
                <td class="py-4 px-2 item-name text-gray-400">—</td>
                <td class="py-4 px-2 item-desc text-gray-400">—</td>
                <td class="py-4 px-2">
                    <input type="number" min="1" value="1" oninput="calculateRowTotal('${rowId}')" class="w-16 border border-gray-300 rounded px-2 py-1 text-sm text-center focus:outline-none">
                </td>
                <td class="py-4 px-2 item-up text-gray-400">0</td>
                <td class="py-4 px-2 text-right font-medium item-total">0</td>
            `;

            tbody.appendChild(tr);
        }

        function deleteRow(rowId) {
            if (tbody.children.length > 1) {
                document.getElementById(rowId).remove();
                calculateGrandTotal();
            }
        }

        // Database autocomplete assignment logic
        function handlePidChange(rowId, pid) {
            const row = document.getElementById(rowId);
            const nameEl = row.querySelector('.item-name');
            const descEl = row.querySelector('.item-desc');
            const upEl = row.querySelector('.item-up');

            if (pid && productDatabase[pid]) {
                const item = productDatabase[pid];
                nameEl.textContent = item.name;
                nameEl.classList.remove('text-gray-400');
                descEl.textContent = item.desc;
                descEl.classList.remove('text-gray-400');
                upEl.textContent = formatNumber(item.up);
                upEl.classList.remove('text-gray-400');
                
                row.dataset.up = item.up;
                row.dataset.name = item.name;
                row.dataset.desc = item.desc;
            } else {
                nameEl.textContent = "—";
                nameEl.classList.add('text-gray-400');
                descEl.textContent = "—";
                descEl.classList.add('text-gray-400');
                upEl.textContent = "0";
                upEl.classList.add('text-gray-400');
                
                row.dataset.up = 0;
                row.removeAttribute('data-name');
            }
            calculateRowTotal(rowId);
        }

        function calculateRowTotal(rowId) {
            const row = document.getElementById(rowId);
            const qty = parseInt(row.querySelector('input[type="number"]').value) || 0;
            const up = parseFloat(row.dataset.up) || 0;
            
            const total = qty * up;
            row.querySelector('.item-total').textContent = formatNumber(total);
            row.dataset.total = total;

            calculateGrandTotal();
        }

        function calculateGrandTotal() {
            let grandTotal = 0;
            tbody.querySelectorAll('tr').forEach(row => {
                grandTotal += parseFloat(row.dataset.total) || 0;
            });
            grandTotalEl.textContent = formatNumber(grandTotal);
        }

        // Validates constraints and maps items to the hidden layout
        function buildReceiptPrintTemplate() {
            errorBanner.classList.add('hidden'); // Clear error state

            const customerName = document.getElementById('customer-name').value.trim();
            
            // Validation 1: Check Customer Name
            if (!customerName) {
                errorBanner.textContent = "Verification Failed: Customer Name is required.";
                errorBanner.classList.remove('hidden');
                return null;
            }

            const slipItemsContainer = document.getElementById('slip-items');
            slipItemsContainer.innerHTML = ''; 

            let grandTotal = 0;
            let validProductCount = 0;
            const structuredArray = [];

            tbody.querySelectorAll('tr').forEach(row => {
                const pid = row.querySelector('select').value;
                if (!pid || !row.dataset.name) return;

                validProductCount++;
                const qty = parseInt(row.querySelector('input[type="number"]').value) || 0;
                const up = parseFloat(row.dataset.up) || 0;
                const total = qty * up;
                grandTotal += total;

                structuredArray.push({ pid, qty, up, total });

                const itemLine = document.createElement('div');
                itemLine.innerHTML = `
                    <div style="display: flex; justify-content: space-between; font-weight: bold;">
                        <span>${row.dataset.name.toUpperCase()}</span>
                        <span>${formatNumber(total)}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: #444; padding-left: 8px;">
                        <span>${qty} ${row.dataset.desc} x XAF ${formatNumber(up)}</span>
                    </div>
                `;
                slipItemsContainer.appendChild(itemLine);
            });

            // Validation 2: Ensure at least one actual product selection was matched
            if (validProductCount === 0) {
                errorBanner.textContent = "Verification Failed: You must select at least one valid product.";
                errorBanner.classList.remove('hidden');
                return null;
            }

            document.getElementById('slip-customer').textContent = customerName;
            document.getElementById('slip-grand-total').textContent = formatNumber(grandTotal);
            return structuredArray;
        }

        function printReceipt() {
            const dataLog = buildReceiptPrintTemplate();
            
            // If validation fails (returns null), intercept execution
            if (!dataLog) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            
            console.log("Captured Dynamic Array Structured Log: ", dataLog);
            window.print();
        }

        function resetForm() {
            errorBanner.classList.add('hidden');
            tbody.innerHTML = '';
            document.getElementById('customer-name').value = "";
            addRow();
            calculateGrandTotal();
        }
    </script>
</body>
</html>
