<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Receipt Generator</title>
    <!-- Tailwind CSS CDN for styling matching Screenshot 2026-07-02 173102.png -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Print styles to format a clean receipt layout and hide UI controls */
        @media print {
            body {
                background: white;
                color: black;
                padding: 20px;
            }
            .no-print, th:first-child, td:first-child {
                display: none !important; /* Hide action column and buttons */
            }
            input, select {
                border: none !important;
                background: transparent !important;
                appearance: none !important;
                -moz-appearance: none !important;
                -webkit-appearance: none !important;
                padding: 0 !important;
                pointer-events: none;
            }
            .receipt-container {
                box-shadow: none !important;
                border: none !important;
                max-width: 100% !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-8">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-sm receipt-container">
        <!-- Header -->
        <h1 class="text-3xl font-light text-teal-900 mb-8">New Receipt</h1>

        <!-- Receipt Table -->
        <div class="overflow-x-auto mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-300 text-xs font-semibold text-gray-600 tracking-wider">
                        <th class="py-3 px-2 w-24">Actions</th>
                        <th class="py-3 px-2 w-32">PID</th>
                        <th class="py-3 px-2">Item Name</th>
                        <th class="py-3 px-2">Description</th>
                        <th class="py-3 px-2 w-24">Qty</th>
                        <th class="py-3 px-2 w-28">UP</th>
                        <th class="py-3 px-2 text-right w-32">Total(XAF)</th>
                    </tr>
                </thead>
                <tbody id="receipt-items">
                    <!-- Dynamic rows will inject here -->
                </tbody>
            </table>
        </div>

        <!-- Grand Total Section -->
        <div class="border-t-2 border-gray-300 pt-4 flex justify-between items-center text-lg font-bold text-gray-900 mb-6">
            <span>Total</span>
            <span id="grand-total">0</span>
        </div>

        <!-- Customer Name Input Row -->
        <div class="mb-12">
            <label class="block text-xs font-semibold text-gray-700 mb-1">
                <span class="text-red-500">*</span>Customer Name
            </label>
            <input type="text" id="customer-name" value="Mengue Frederick" class="w-64 bg-blue-50 text-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-300">
        </div>

        <!-- Action Buttons Footer -->
        <div class="flex justify-between items-center pt-6 border-t border-gray-100 no-print">
            <button onclick="printReceipt()" class="bg-emerald-950 hover:bg-emerald-900 text-white font-medium px-4 py-2.5 rounded flex items-center gap-2 cursor-pointer text-sm shadow-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print receipt
            </button>
            <button onclick="resetForm()" class="bg-gray-200 hover:bg-gray-300 text-red-700 font-medium px-5 py-2.5 rounded text-sm transition-colors cursor-pointer">
                Cancel
            </button>
        </div>
    </div>

    <script>
        // Mock Database Object containing product records
        const productDatabase = {
            "RdCn": { name: "Red Corn", desc: "bag", up: 4000 },
            "WhCn": { name: "White Corn", desc: "bag", up: 4200 },
            "YlCn": { name: "Yellow Corn", desc: "bag", up: 3800 },
            "SgBr": { name: "Sugar Brown", desc: "kg", up: 800 }
        };

        const tbody = document.getElementById('receipt-items');
        const grandTotalEl = document.getElementById('grand-total');

        // Helper to format currency digits with commas
        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        // Initialize table with one row
        window.onload = () => {
            addRow();
        };

        // Add a new item row to the table
        function addRow() {
            const rowId = 'row_' + Date.now() + Math.random().toString(36).substr(2, 4);
            const tr = document.createElement('tr');
            tr.id = rowId;
            tr.className = "border-b border-gray-100 text-sm text-gray-800";

            // Generate Select PID options from mock DB keys
            let pidOptions = `<option value="">-- Select --</option>`;
            for (let key in productDatabase) {
                pidOptions += `<option value="${key}">${key}</option>`;
            }

            tr.innerHTML = `
                <td class="py-4 px-2 flex items-center gap-1.5 no-print">
                    <button onclick="addRow()" class="w-6 h-6 flex items-center justify-center bg-green-50 text-green-600 rounded cursor-pointer border border-green-200 hover:bg-green-100 font-bold text-base">+</button>
                    <button onclick="deleteRow('${rowId}')" class="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded cursor-pointer border border-red-100 hover:bg-red-100">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </td>
                <td class="py-4 px-2">
                    <select onchange="handlePidChange('${rowId}', this.value)" class="bg-white border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-teal-600 max-w-full">
                        ${pidOptions}
                    </select>
                </td>
                <td class="py-4 px-2 item-name">—</td>
                <td class="py-4 px-2 item-desc">—</td>
                <td class="py-4 px-2">
                    <input type="number" min="1" value="1" oninput="calculateRowTotal('${rowId}')" class="w-16 border border-gray-300 rounded px-2 py-1 text-sm text-center focus:outline-none focus:ring-1 focus:ring-teal-600">
                </td>
                <td class="py-4 px-2 item-up">0</td>
                <td class="py-4 px-2 text-right font-medium item-total">0</td>
            `;

            tbody.appendChild(tr);
            
            // Default to 'RdCn' for the very first item to emulate screenshot exactly
            if (tbody.children.length === 1) {
                const select = tr.querySelector('select');
                select.value = 'RdCn';
                handlePidChange(rowId, 'RdCn');
            }
        }

        // Delete row implementation ensuring at least one row remains
        function deleteRow(rowId) {
            if (tbody.children.length > 1) {
                document.getElementById(rowId).remove();
                calculateGrandTotal();
            } else {
                alert("Receipt must contain at least one row.");
            }
        }

        // Triggered when PID changes to autocomplete properties
        function handlePidChange(rowId, pid) {
            const row = document.getElementById(rowId);
            const nameEl = row.querySelector('.item-name');
            const descEl = row.querySelector('.item-desc');
            const upEl = row.querySelector('.item-up');

            if (pid && productDatabase[pid]) {
                const item = productDatabase[pid];
                nameEl.textContent = item.name;
                descEl.textContent = item.desc;
                upEl.textContent = formatNumber(item.up);
                // Preserve unit price dynamically in a data attribute
                row.dataset.up = item.up;
            } else {
                nameEl.textContent = "—";
                descEl.textContent = "—";
                upEl.textContent = "0";
                row.dataset.up = 0;
            }
            calculateRowTotal(rowId);
        }

        // Calculate single row math
        function calculateRowTotal(rowId) {
            const row = document.getElementById(rowId);
            const qty = parseInt(row.querySelector('input[type="number"]').value) || 0;
            const up = parseFloat(row.dataset.up) || 0;
            
            const total = qty * up;
            row.querySelector('.item-total').textContent = formatNumber(total);
            row.dataset.total = total;

            calculateGrandTotal();
        }

        // Aggregate grand totals across active DOM elements
        function calculateGrandTotal() {
            let grandTotal = 0;
            const rows = tbody.querySelectorAll('tr');
            
            rows.forEach(row => {
                grandTotal += parseFloat(row.dataset.total) || 0;
            });

            grandTotalEl.textContent = formatNumber(grandTotal);
        }

        // Formats submission elements into an exportable standard Object array structure
        function getReceiptDataStructure() {
            const data = {
                customerName: document.getElementById('customer-name').value,
                items: [],
                grandTotal: 0
            };

            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const pid = row.querySelector('select').value;
                if(pid) {
                    data.items.push({
                        pid: pid,
                        name: row.querySelector('.item-name').textContent,
                        description: row.querySelector('.item-desc').textContent,
                        qty: parseInt(row.querySelector('input[type="number"]').value) || 0,
                        unitPrice: parseFloat(row.dataset.up) || 0,
                        total: parseFloat(row.dataset.total) || 0
                    });
                }
            });
            
            data.grandTotal = data.items.reduce((sum, item) => sum + item.total, 0);
            return data;
        }

        // Print function
        function printReceipt() {
            // Logs out structured clean array format requested prior to printing
            console.log("Structured Invoice Data Object Dynamic Output:", getReceiptDataStructure());
            window.print();
        }

        // Cancel/Reset function
        function resetForm() {
            tbody.innerHTML = '';
            document.getElementById('customer-name').value = "Mengue Frederick";
            addRow();
        }
    </script>
</body>
</html>
